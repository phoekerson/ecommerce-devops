services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../src/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ecommerce}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    mem_limit: 256m
    networks:
      - private

  backend:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.backend
      target: builder
    command: sh -c "npm run dev"
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../../src/backend/.env
    environment:
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
    volumes:
      - ../../src/backend/src:/app/src
    ports:
      - "5000:5000"
    mem_limit: 256m
    networks:
      - private
      - public

  frontend:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    mem_limit: 128m
    networks:
      - public

volumes:
  postgres_data:

networks:
  private:
    driver: bridge
  public:
    driver: bridge
