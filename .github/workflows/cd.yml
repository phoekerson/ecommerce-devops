name: CD Pipeline

on:
  push:
    branches: [main]

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -p ${{ secrets.VPS_PORT }} \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'

            set -e
            cd /opt/ecommerce/ecommerce-devops

            echo "==> Pull derniere version..."
            git pull origin main

            echo "==> Build et redemarrage des containers..."
            docker compose -f infrastructure/docker/docker-compose.prod.yml \
              --env-file .env.production \
              up -d --build

            echo "==> Nettoyage images inutilisees..."
            docker image prune -f

            echo "==> Verification sante des containers..."
            sleep 10
            docker compose -f infrastructure/docker/docker-compose.prod.yml ps

          ENDSSH

      - name: Health check
        run: |
          echo "==> Test API health..."
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.VPS_HOST }}/api/health)
          if [ "$STATUS" = "200" ]; then
            echo "✓ API repond correctement (HTTP $STATUS)"
          else
            echo "✗ API ne repond pas (HTTP $STATUS)"
            exit 1
          fi

      - name: Notify success
        if: success()
        run: |
          echo "✓ Deploiement reussi sur http://${{ secrets.VPS_HOST }}"
          echo "Commit: ${{ github.sha }}"
          echo "Auteur: ${{ github.actor }}"

      - name: Notify failure
        if: failure()
        run: |
          echo "✗ Deploiement echoue !"
          echo "Commit: ${{ github.sha }}"
          echo "Verifiez les logs sur le VPS :"
          echo "docker compose -f infrastructure/docker/docker-compose.prod.yml logs"